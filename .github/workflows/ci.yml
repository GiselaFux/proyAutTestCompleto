name: CI Proyecto Final

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.12"

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar unit tests (UI + API)
        run: |
          mkdir -p reports
          pytest tests/unit -m unit -v --html=reports/unit_report.html --self-contained-html

      - name: Subir reporte unit
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: reports/unit_report.html

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    env:
      PYTHON_VERSION: "3.12"

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar integration tests UI + API
        run: |
          mkdir -p reports
          pytest tests/integration -m integration -v --html=reports/integration_report.html --self-contained-html

      - name: Subir reporte integration
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: reports/integration_report.html

  e2e-and-bdd:
    runs-on: ubuntu-latest
    needs: integration-tests
    env:
      PYTHON_VERSION: "3.12"

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar E2E ui tests
        run: |
          mkdir -p reports
          pytest tests/e2e/ui -m "ui and e2e" -v --html=reports/e2e_report.html --self-contained-html

      - name: Set PYTHONPATH to project root
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Ejecutar BDD (Behave)
        run: |
          behave behave/features -f json -o reports/behave.json -f pretty

      - name: Subir reportes E2E + BDD
        uses: actions/upload-artifact@v4
        with:
          name: e2e-and-bdd-reports
          path: reports/          
          