[pytest]
addopts = -v --html=reports/pytest_report.html --self-contained-html --capture=tee-sys
pythonpath = src
testpaths = tests
markers =
    ui: Pruebas relacionadas a UI (Selenium)
    api: Pruebas relacionadas a API
    e2e: Pruebas end-to-end
    integration: Pruebas de integración
    unit: Pruebas unitarias
log_cli = true
log_cli_level = INFO